<style>
  :root{
    --ink:#0e0e0e;
    --paper:#ffffff;
    --bordeaux:#6B1E2E;
    --gold:#A9805A;
    --grey:#767676;
    --line: rgba(0,0,0,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Jost',sans-serif;
    font-weight:400;
    overflow-x:hidden;
  }
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;font-weight:400;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ---------- NAV ---------- */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 6vw;
    transition:background 0.5s ease, padding 0.4s ease, box-shadow 0.4s ease;
  }
  nav.scrolled{
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(8px);
    padding:16px 6vw;
    box-shadow:0 1px 0 var(--line);
  }
  .logo{
    display:flex;align-items:center;gap:10px;
    font-family:'Cormorant Garamond',serif;
    font-size:1.15rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
  }
  .logo img{width:26px;height:26px;border-radius:50%;flex:none;}
  .nav-right{display:flex;align-items:center;gap:2.4rem;}
  .nav-links{display:flex;align-items:center;gap:2.6rem;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;}
  .nav-links a{position:relative;padding-bottom:4px;}
  .nav-links a::after{
    content:'';position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--bordeaux);
    transition:width 0.35s ease;
  }
  .nav-links a:hover::after{width:100%;}
  .nav-links .btn{padding-bottom:0;}
  .nav-links .btn::after{display:none;}

  .lang-switch{display:flex;gap:0.6rem;font-size:0.72rem;letter-spacing:0.1em;}
  .lang-switch button{
    background:none;border:none;cursor:pointer;color:var(--grey);
    font-family:'Jost',sans-serif;padding:2px 4px;transition:color .3s ease;
  }
  .lang-switch button.active{color:var(--bordeaux);font-weight:500;}
  .lang-switch span{color:var(--line);}

  .btn{
    display:inline-block;font-family:'Jost',sans-serif;font-weight:500;
    font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;
    padding:0.75rem 1.4rem;text-decoration:none;cursor:pointer;
    border:1px solid transparent;transition:opacity .25s ease, background .25s ease;
  }
  .btn:hover{opacity:0.85;}
  .btn-ghost{border-color:var(--ink);color:var(--ink);}
  .btn-solid{background:var(--bordeaux);color:#fff;}

  .nav-toggle{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink);}

  @media(max-width:900px){
    .nav-links{
      position:fixed;inset:0;
      background:var(--ink);
      color:var(--paper);
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:2.2rem;
      font-size:1.1rem;
      opacity:0;pointer-events:none;
      transition:opacity 0.4s ease;
    }
    .nav-links.open{opacity:1;pointer-events:all;}
    .nav-links .btn-ghost{border-color:rgba(255,255,255,0.5);color:#fff;}
    .nav-toggle{display:block;z-index:110;}
    .lang-switch{position:fixed;bottom:2.4rem;left:0;right:0;justify-content:center;z-index:110;opacity:0;pointer-events:none;transition:opacity .4s ease;}
    .lang-switch.open{opacity:1;pointer-events:all;}
    .lang-switch button{color:rgba(255,255,255,0.6);}
    .lang-switch button.active{color:var(--gold);}
  }

  /* ---------- HERO ---------- */
  .hero{position:relative;height:100svh;overflow:hidden;background:#111 center/cover no-repeat;}
  .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(14,14,14,0.25), rgba(14,14,14,0.7));}
  .hero-content{
    position:relative;z-index:2;height:100%;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:0 6vw 5rem;color:var(--paper);
  }
  .hero-eyebrow{
    font-size:0.78rem;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--gold);margin-bottom:1.2rem;
    opacity:0;animation:riseIn 1s ease 0.4s forwards;
  }
  .hero h1{
    font-size:clamp(2.2rem,6vw,4.6rem);font-weight:400;line-height:1.1;
    letter-spacing:0.03em;text-transform:uppercase;max-width:18ch;color:#fff;
    opacity:0;animation:riseIn 1s ease 0.6s forwards;
  }
  .hero-sub{
    margin-top:1.6rem;max-width:40ch;font-size:1.02rem;line-height:1.6;color:rgba(255,255,255,0.85);
    opacity:0;animation:riseIn 1s ease 0.85s forwards;
  }
  .hero-ctas{margin-top:2.2rem;display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:riseIn 1s ease 1s forwards;}
  .hero-ctas .btn-ghost{border-color:rgba(255,255,255,0.6);color:#fff;}
  .hero-ctas .btn-solid{background:var(--bordeaux);color:#fff;}
  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  .scroll-cue{
    position:absolute;bottom:2rem;left:6vw;z-index:2;color:var(--paper);
    font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
    opacity:0;animation:riseIn 1s ease 1.3s forwards;
  }
  .scroll-cue .stem{width:1px;height:34px;background:rgba(255,255,255,0.5);position:relative;overflow:hidden;}
  .scroll-cue .stem::after{
    content:'';position:absolute;top:-100%;left:0;width:100%;height:100%;background:var(--gold);
    animation:stemDrop 2.2s ease-in-out infinite;
  }
  @keyframes stemDrop{0%{top:-100%;}60%{top:100%;}100%{top:100%;}}

  /* ---------- SECTION SHELL ---------- */
  section{padding:8.5rem 6vw;}
  .section-head{max-width:640px;margin-bottom:4rem;}
  .eyebrow{
    font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--bordeaux);
    display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;
  }
  .eyebrow::before{content:'';width:28px;height:1px;background:var(--bordeaux);}
  .section-alt .eyebrow{color:var(--gold);}
  .section-alt .eyebrow::before{background:var(--gold);}
  .section-head h2{font-size:clamp(2rem,4vw,3rem);font-weight:400;line-height:1.15;}
  .section-head p{margin-top:1.2rem;color:var(--grey);line-height:1.7;font-size:1.02rem;max-width:52ch;}
  .section-alt .section-head p{color:rgba(255,255,255,0.65);}
  .section-alt .section-head h2{color:#fff;}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.9s ease, transform 0.9s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}

  /* ---------- THREAD SIGNATURE (process) ---------- */
  .thread-wrap{position:relative;}
  .thread-line{
    position:absolute;left:24px;top:0;bottom:0;width:1px;
    background:linear-gradient(to bottom, transparent, var(--gold) 8%, var(--gold) 92%, transparent);
  }
  .thread-line .drop{
    position:absolute;left:50%;top:0;width:9px;height:9px;border-radius:50%;
    background:var(--bordeaux);transform:translate(-50%,-50%);
    box-shadow:0 0 0 5px var(--paper);
  }
  .moments{display:flex;flex-direction:column;gap:3.2rem;padding-left:64px;position:relative;}
  .moment{position:relative;}
  .moment .num{
    position:absolute;left:-64px;top:0;width:48px;text-align:right;
    font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:1.3rem;
  }
  .moment h3{font-size:1.3rem;font-weight:400;margin-bottom:0.5rem;}
  .moment p{color:var(--grey);line-height:1.7;max-width:56ch;font-size:0.98rem;}

  /* ---------- CRAFT (3-up) ---------- */
  .craft-row{display:flex;gap:3.4rem;flex-wrap:wrap;}
  .craft-item{flex:1 1 220px;}
  .craft-item .num{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--bordeaux);font-size:1.3rem;}
  .craft-item h3{font-size:1.25rem;font-weight:400;margin:0.5rem 0 0.6rem;}
  .craft-item p{color:var(--grey);line-height:1.7;font-size:0.98rem;}

  /* ---------- GALLERY GRID ---------- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .grid figure{position:relative;overflow:hidden;background:var(--ink);cursor:pointer;aspect-ratio:4/5;}
  .grid img{width:100%;height:100%;object-fit:cover;transition:transform 1.1s cubic-bezier(.16,.84,.44,1), filter .6s ease;}
  .grid figure:hover img{transform:scale(1.06);filter:saturate(1.1);}
  .grid figcaption{
    position:absolute;left:0;right:0;bottom:0;padding:1.2rem 1.3rem;
    background:linear-gradient(to top, rgba(14,14,14,0.8), transparent);
    color:#fff;font-size:0.85rem;letter-spacing:0.04em;
    opacity:0;transform:translateY(8px);transition:opacity .4s ease, transform .4s ease;
  }
  .grid figure:hover figcaption{opacity:1;transform:translateY(0);}
  @media(max-width:820px){ .grid{grid-template-columns:1fr;} }
  .gallery-note{margin-top:1.6rem;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--grey);font-size:0.95rem;}

  /* ---------- WHY PARTNER (dark cards) ---------- */
  .why-wrap{background:var(--ink);border-radius:2px;padding:5rem 6vw;}
  .why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.12);}
  @media(max-width:820px){.why-grid{grid-template-columns:1fr;}}
  .why-card{background:var(--ink);padding:2.2rem;}
  .why-card h3{color:#fff;font-size:1.15rem;font-weight:400;margin-bottom:0.6rem;}
  .why-card p{color:rgba(255,255,255,0.6);line-height:1.7;font-size:0.95rem;}

  /* ---------- CTA / CONTACT ---------- */
  .contact-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:5rem;align-items:start;}
  @media(max-width:820px){.contact-grid{grid-template-columns:1fr;gap:3rem;}}
  .contact-ctas{margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap;}
  .contact-info{background:var(--bordeaux);color:#fff;padding:3rem 2.6rem;border-radius:2px;}
  .contact-info h3{font-size:1.5rem;font-weight:400;margin-bottom:1.2rem;color:#fff;}
  .contact-info p{color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:1.8rem;}
  .contact-info .line{padding:0.85rem 0;border-top:1px solid rgba(255,255,255,0.2);display:flex;justify-content:space-between;font-size:0.9rem;}
  .contact-info .line:last-child{border-bottom:1px solid rgba(255,255,255,0.2);}

  footer{padding:3rem 6vw;text-align:center;color:var(--grey);font-size:0.8rem;border-top:1px solid var(--line);}

  a:focus-visible, button:focus-visible{outline:2px solid var(--bordeaux);outline-offset:3px;}
</style>
</head>

  function setLang(lang){
    const dict = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(dict[key] !== undefined) el.innerHTML = dict[key];
    });
    document.getElementById('pageTitle').textContent = dict.page_title;
    document.getElementById('htmlRoot').setAttribute('lang', lang);
    document.querySelectorAll('.lang-switch button').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-lang') === lang);
    });
  }

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang')));
  });

  setLang('en');

  // sticky nav background on scroll
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  // mobile menu
  const navToggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');
  navToggle.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });
  function closeMenu(){ navLinks.classList.remove('open'); }

  // cookie notice
  function getCookie(name){
    return document.cookie.split('; ').find(row => row.startsWith(name+'='));
  }
  const cookieBar = document.getElementById('cookieBar');
  if(getCookie('eyecu_cookie_ack')){
    cookieBar.style.display = 'none';
  }
  document.getElementById('cookieAccept').addEventListener('click', () => {
    const d = new Date(); d.setFullYear(d.getFullYear()+1);
    document.cookie = 'eyecu_cookie_ack=1; expires=' + d.toUTCString() + '; path=/';
    cookieBar.style.display = 'none';
  });

  const revealEls = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold:0.15});
  revealEls.forEach(el => io.observe(el));
</script>
